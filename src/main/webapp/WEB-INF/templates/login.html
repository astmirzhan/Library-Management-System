<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign in · Library</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<section id="loginView">
    <div class="login-art">
        <div class="brand"><span class="brand-mark">⌁</span> Library</div>
        <div class="login-copy">
            <h1>Your next chapter starts here.</h1>
            <p>Discover, borrow, review and manage books through one polished digital library experience.</p>
        </div>
        <footer></footer>
    </div>
    <div class="login-panel">
        <div class="login-card">
            <h2>Sign in to Library</h2>
            <p>Use your role credentials to access your dashboard.</p>

            <div th:if="${param.registered}"
                 style="padding: 12px; border-radius: 12px; background: var(--brand-2); color: var(--brand); font-size: 13px; font-weight: 600; margin-bottom: 16px;">
                Registration successful! Please sign in.
            </div>

            <div th:if="${error}"
                 style="padding: 12px; border-radius: 12px; background: #f7e2e0; color: var(--danger); font-size: 13px; font-weight: 600; margin-bottom: 16px; border: 1px solid rgba(184, 72, 67, 0.15);"
                 th:text="${error}">Error
            </div>

            <form method="post" th:action="@{/login}" class="login-form">
                <div class="field">
                    <label for="email">Email address</label>
                    <input id="email" name="email" type="email"
                           placeholder="Enter your email" required>
                </div>
                <div class="field">
                    <label for="password">Password</label>
                    <input id="password" name="password" type="password"
                           placeholder="Enter password" required minlength="6">
                </div>
                <button class="btn" type="submit">Sign in →</button>
            </form>

            <p style="margin-top: 20px; text-align: center; color: var(--muted); font-size: 13px;">
                No account?
                <a th:href="@{/register}"
                   style="color: var(--brand); font-weight: 700; text-decoration: none;">Register</a>
            </p>
        </div>
    </div>
</section>
</body>
</html>
