<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register · Library</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap-grid.min.css">
    <link rel="stylesheet" href="/css/style.css" th:href="@{/css/style.css}">
</head>
<body>
<section id="loginView">
    <div class="login-art">
        <div class="brand"><span class="brand-mark">⌁</span> Library</div>
        <div class="login-copy">
            <h1>Join our community of readers.</h1>
            <p>Create your account, start borrowing books and share your thoughts.</p>
        </div>
        <footer></footer>
    </div>
    <div class="login-panel">
        <div class="login-card">
            <div style="text-align:right; margin-bottom:8px; font-size:13px;">
                <a href="?lang=en" style="color:var(--brand); font-weight:800; text-decoration:none;" th:text="#{lang.en}">EN</a>
                <span style="color:var(--muted);">|</span>
                <a href="?lang=ru" style="color:var(--brand); font-weight:800; text-decoration:none;" th:text="#{lang.ru}">RU</a>
            </div>
            <h2 th:text="#{auth.registerTitle}">Create your account</h2>
            <p th:text="#{auth.registerSubtitle}">Register as a new reader to start borrowing.</p>

            <div th:if="${error}"
                 style="padding: 12px; border-radius: 12px; background: #f7e2e0; color: var(--danger); font-size: 13px; font-weight: 600; margin-bottom: 16px;"
                 th:text="${error}">Error
            </div>

            <form method="post" th:action="@{/register}" class="login-form">
                <div class="field">
                    <label for="username" th:text="#{auth.username}">Username</label>
                    <input id="username" name="username" type="text"
                           placeholder="At least 3 characters" required minlength="3">
                </div>
                <div class="field">
                    <label for="email" th:text="#{auth.email}">Email address</label>
                    <input id="email" name="email" type="email"
                           placeholder="you@example.com" required>
                </div>
                <div class="field">
                    <label for="phoneNumber" th:text="#{auth.phone}">Phone number (optional)</label>
                    <input id="phoneNumber" name="phoneNumber" type="tel"
                           placeholder="+7 700 123 45 67">
                </div>
                <div class="field">
                    <label for="password" th:text="#{auth.password}">Password</label>
                    <input id="password" name="password" type="password"
                           placeholder="At least 6 characters" required minlength="6">
                </div>
                <button class="btn" type="submit" th:text="#{auth.register}">Create account →</button>
            </form>

            <p style="margin-top: 20px; text-align: center; color: var(--muted); font-size: 13px;">
                <span th:text="#{auth.haveAccount}">Already have an account?</span>
                <a th:href="@{/login}"
                   style="color: var(--brand); font-weight: 700; text-decoration: none;"
                   th:text="#{auth.login}">Sign in</a>
            </p>
        </div>
    </div>
</section>
</body>
</html>
