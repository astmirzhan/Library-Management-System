<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Profile · Library</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css" th:href="@{/css/style.css}">
</head>
<body>
<section id="appView">
    <aside th:replace="~{fragments/sidebar :: sidebar('profile')}"></aside>

    <main class="main">
        <header class="topbar">
            <div class="top-actions">
                <div class="page-title">
                    <h1>My profile</h1>
                    <p>View and update your account details.</p>
                </div>
            </div>
        </header>

        <div th:if="${success}" class="panel"
             style="margin-bottom:20px; padding:14px 18px; background:var(--brand-2); color:var(--brand); border-color:var(--brand);"
             th:text="${success}"></div>
        <div th:if="${error}" class="panel"
             style="margin-bottom:20px; padding:14px 18px; background:#f7e2e0; color:var(--danger);"
             th:text="${error}"></div>

        <div class="split-grid" style="align-items: start;">
            <!-- Read-only summary -->
            <div class="panel" style="padding: 28px;">
                <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 22px;">
                    <div style="width: 64px; height: 64px; border-radius: 50%; background: var(--brand);
                                color: #fff; display: flex; align-items: center; justify-content: center;
                                font-size: 24px; font-weight: 800;"
                         th:text="${#strings.toUpperCase(#strings.substring(user.username, 0, 2))}">LI</div>
                    <div>
                        <h2 style="margin: 0;" th:text="${user.username}">username</h2>
                        <span class="status" th:text="${user.role.name()}">ROLE</span>
                    </div>
                </div>

                <div style="display: grid; gap: 0;">
                    <div style="display: flex; justify-content: space-between; padding: 12px 0; border-top: 1px solid var(--line, #e6e2d6);">
                        <span style="color: var(--muted);">Email</span>
                        <strong th:text="${user.email}">email</strong>
                    </div>
                    <div style="display: flex; justify-content: space-between; padding: 12px 0; border-top: 1px solid var(--line, #e6e2d6);">
                        <span style="color: var(--muted);">Phone</span>
                        <strong th:text="${user.phoneNumber != null and !user.phoneNumber.isEmpty() ? user.phoneNumber : '—'}">—</strong>
                    </div>
                    <div style="display: flex; justify-content: space-between; padding: 12px 0; border-top: 1px solid var(--line, #e6e2d6);">
                        <span style="color: var(--muted);">Member since</span>
                        <strong th:text="${user.registrationDate}">date</strong>
                    </div>
                    <div style="display: flex; justify-content: space-between; padding: 12px 0; border-top: 1px solid var(--line, #e6e2d6);">
                        <span style="color: var(--muted);">User ID</span>
                        <strong>#<span th:text="${user.userId}">0</span></strong>
                    </div>
                </div>
            </div>

            <!-- Edit form -->
            <div class="panel" style="padding: 28px;">
                <span class="eyebrow" style="color: var(--brand);">Edit details</span>
                <h2 style="margin: 6px 0 18px;">Update your info</h2>
                <form method="post" th:action="@{/profile/update}"
                      style="display: grid; gap: 16px;">
                    <div>
                        <label for="username" style="display:block; margin-bottom:6px;"><strong>Username</strong></label>
                        <input type="text" id="username" name="username" required minlength="3"
                               th:value="${user.username}">
                    </div>
                    <div>
                        <label for="email" style="display:block; margin-bottom:6px;"><strong>Email</strong></label>
                        <input type="email" id="email" name="email" required
                               th:value="${user.email}">
                    </div>
                    <div>
                        <label for="phoneNumber" style="display:block; margin-bottom:6px;"><strong>Phone number</strong></label>
                        <input type="tel" id="phoneNumber" name="phoneNumber"
                               th:value="${user.phoneNumber}"
                               maxlength="20" pattern="[0-9 +()-]{7,20}"
                               title="7 to 20 characters: digits and the symbols + - ( ) space"
                               placeholder="+1-555-0100">
                    </div>
                    <button type="submit" class="btn" style="justify-self: start;">Save changes</button>
                </form>
            </div>
        </div>
    </main>
</section>
</body>
</html>
