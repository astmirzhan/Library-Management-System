<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>User Management · Library</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css" th:href="@{/css/style.css}">
</head>
<body>
<section id="appView">
    <aside th:replace="~{fragments/sidebar :: sidebar('users')}"></aside>

    <main class="main">
        <header class="topbar">
            <div class="top-actions">
                <div class="page-title">
                    <h1>User management</h1>
                    <p>View and manage all registered accounts.</p>
                </div>
            </div>
        </header>

        <!-- Flash messages -->
        <div th:if="${success}" class="panel"
             style="margin-bottom:20px; padding:14px 18px; background:var(--brand-2); color:var(--brand); border-color:var(--brand);"
             th:text="${success}"></div>
        <div th:if="${error}" class="panel"
             style="margin-bottom:20px; padding:14px 18px; background:#f7e2e0; color:var(--danger);"
             th:text="${error}"></div>

        <!-- Add librarian -->
        <div class="panel" style="padding: 20px; margin-bottom: 22px;">
            <span class="eyebrow" style="color: var(--brand);">Staff</span>
            <h2 style="margin: 6px 0 14px;">Add librarian</h2>
            <form method="post" th:action="@{/admin/librarians}"
                  style="display:grid; grid-template-columns: repeat(4, 1fr); gap: 12px; align-items:end;">
                <div>
                    <label for="username" style="display:block; margin-bottom:6px;"><strong>Username</strong></label>
                    <input type="text" id="username" name="username" required minlength="3">
                </div>
                <div>
                    <label for="email" style="display:block; margin-bottom:6px;"><strong>Email</strong></label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div>
                    <label for="password" style="display:block; margin-bottom:6px;"><strong>Password</strong></label>
                    <input type="password" id="password" name="password" required minlength="6">
                </div>
                <div>
                    <label for="phoneNumber" style="display:block; margin-bottom:6px;"><strong>Phone</strong></label>
                    <input type="tel" id="phoneNumber" name="phoneNumber"
                           maxlength="20" pattern="[0-9 +()-]{7,20}">
                </div>
                <button type="submit" class="btn" style="grid-column: 1 / -1; justify-self: start;">
                    + Create librarian
                </button>
            </form>
        </div>

        <div class="section-head">
            <div>
                <h2>Registered users</h2>
                <p th:text="|${#lists.size(users)} account${#lists.size(users) == 1 ? '' : 's'} on this page|">accounts</p>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(users)}" class="panel empty">
            No users to display.
        </div>

        <div th:if="${not #lists.isEmpty(users)}" class="panel table-wrap">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Registered</th>
                    <th>Phone</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="u : ${users}">
                    <td>#<span th:text="${u.userId}">1</span></td>
                    <td th:text="${u.username}">name</td>
                    <td th:text="${u.email}">email</td>
                    <td><span class="status" th:text="${u.role.name()}">ROLE</span></td>
                    <td>
                        <span th:if="${u.active}" class="status">Active</span>
                        <span th:unless="${u.active}" class="status out">Blocked</span>
                    </td>
                    <td th:text="${u.registrationDate}">date</td>
                    <td th:text="${u.phoneNumber != null ? u.phoneNumber : '—'}">—</td>
                    <td>
                        <!-- Admin may only manage LIBRARIAN accounts -->
                        <div th:if="${u.role.name() == 'LIBRARIAN'}" style="display:flex; gap:6px;">
                            <form method="post"
                                  th:action="@{/admin/users/toggle/{id}(id=${u.userId})}"
                                  style="display:inline">
                                <button type="submit" class="btn ghost small"
                                        th:text="${u.active} ? 'Block' : 'Activate'">Block</button>
                            </form>
                            <form method="post"
                                  th:action="@{/admin/users/delete/{id}(id=${u.userId})}"
                                  style="display:inline"
                                  onsubmit="return confirm('Delete this librarian?');">
                                <button type="submit" class="btn ghost small"
                                        style="color: var(--danger);">Delete</button>
                            </form>
                        </div>
                        <span th:unless="${u.role.name() == 'LIBRARIAN'}" style="color: var(--muted);">—</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div th:if="${totalPages > 1}"
             style="margin-top: 32px; display: flex; gap: 8px; justify-content: center; align-items: center;">
            <a th:if="${currentPage > 1}"
               th:href="@{/admin/users(page=${currentPage - 1})}"
               class="btn ghost small">← Prev</a>
            <span th:each="i : ${#numbers.sequence(1, totalPages)}">
                <a th:href="@{/admin/users(page=${i})}"
                   th:text="${i}"
                   th:class="${i == currentPage} ? 'btn small' : 'btn ghost small'">1</a>
            </span>
            <a th:if="${currentPage < totalPages}"
               th:href="@{/admin/users(page=${currentPage + 1})}"
               class="btn ghost small">Next →</a>
        </div>
    </main>
</section>
</body>
</html>
