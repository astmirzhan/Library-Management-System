<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Book · Library</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css" th:href="@{/css/style.css}">
</head>
<body>
<section id="appView">
    <aside th:replace="~{fragments/sidebar :: sidebar('books')}"></aside>

    <main class="main">
        <header class="topbar">
            <div class="top-actions">
                <div class="page-title">
                    <h1>Edit book</h1>
                    <p>Update catalog details for this title.</p>
                </div>
            </div>
            <div class="top-actions">
                <a th:href="@{/librarian/books}" class="btn ghost small">← Back to inventory</a>
            </div>
        </header>

        <div th:if="${error}" class="panel"
             style="margin-bottom:20px; padding:14px 18px; background:#f7e2e0; color:var(--danger);"
             th:text="${error}"></div>

        <div class="panel" style="padding: 24px; max-width: 640px;">
            <form method="post" th:action="@{/librarian/books/{id}/edit(id=${book.bookId})}"
                  style="display: grid; gap: 14px;">
                <div>
                    <label for="title"><strong>Title</strong></label>
                    <input type="text" id="title" name="title" required th:value="${book.title}">
                </div>
                <div>
                    <label for="isbn"><strong>ISBN</strong></label>
                    <input type="text" id="isbn" name="isbn" required th:value="${book.isbn}">
                </div>
                <div>
                    <label for="publicationYear"><strong>Publication year</strong></label>
                    <input type="number" id="publicationYear" name="publicationYear"
                           min="1000" max="2100" required th:value="${book.publicationYear}">
                </div>
                <div>
                    <label for="description"><strong>Description</strong></label>
                    <textarea id="description" name="description" rows="3"
                              th:text="${book.description}"></textarea>
                </div>
                <div style="color: var(--muted);">
                    Copies: <strong th:text="${book.totalCopies}">0</strong> total,
                    <strong th:text="${book.availableCopies}">0</strong> available
                    (manage copies from the inventory page).
                </div>
                <button type="submit" class="btn" style="justify-self: start;">Save changes</button>
            </form>
        </div>
    </main>
</section>
</body>
</html>
